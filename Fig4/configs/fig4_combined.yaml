  fig4_cell2location_train:
    seed: 0
    out_dir: results/Fig4/cell2location_train
    single_cell:
      input_h5ad: results/Fig4/cell2location_sc_ref/somatic_1226.h5ad
      labels_key: celltype
      batch_key: orig.ident
      drop_mt: true
      filter_genes:
        cell_count_cutoff: 5
        cell_percentage_cutoff2: 0.03
        nonz_mean_cutoff: 1.12
      train:
        use_gpu: true
        max_epochs: 800
        lr: 0.001
        train_size: 1.0
      export_posterior:
        num_samples: 1000
        batch_size: 2500
    spatial:
      input_h5ad: results/Fig4/cell2location_spatial/B04372C211.cell2location_spatial_counts.h5ad
      batch_key: orig.ident
      map:
        N_cells_per_location: 1
        detection_alpha: 20
      train:
        max_epochs: 10000
        batch_size: null
        train_size: 1.0
      export_posterior:
        num_samples: 1000
        batch_size: null
